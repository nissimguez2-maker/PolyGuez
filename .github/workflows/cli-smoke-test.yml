name: CLI smoke test

on:
  pull_request:
    paths:
      - "agents/**"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/cli-smoke-test.yml"

jobs:
  cli_smoke_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CLI help
        env:
          PYTHONPATH: .
        run: |
          python scripts/python/cli.py --help
