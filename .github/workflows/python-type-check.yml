name: Python type check

on:
  pull_request:
    paths:
      - "agents/**/*.py"
      - "scripts/python/**/*.py"
      - "pyproject.toml"
      - ".github/workflows/python-type-check.yml"

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - run: |
          mypy agents scripts/python
